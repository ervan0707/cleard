name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-audit:
    name: build, test, audit (${{ matrix.system }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
          - os: macos-15-intel
            system: x86_64-darwin
          - os: macos-14
            system: aarch64-darwin
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      # Pulls from and pushes to the Cachix cache. Anything realised during the
      # job (notably `nix build` below) is uploaded so users and later CI runs
      # download the prebuilt binary instead of recompiling. Replaces the
      # now-defunct magic-nix-cache (shut down by Determinate Systems Feb 2025).
      - name: Set up Cachix
        uses: cachix/cachix-action@v15
        with:
          name: skinnyvans
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      # Each runner builds its native system, so the matrix covers every system
      # the flake defines. `nix build` produces a real store path, which is what
      # cachix-action pushes.
      - name: Build package
        run: nix build --print-build-logs

      - name: Test
        run: nix develop -c cargo test --locked

      - name: Audit dependencies
        run: nix develop -c cargo audit
